      case 'agenda': return <AgendaTab />;

      case 'targets': return <TargetsTab />;
      case 'participants': return <ParticipantsTab />;
      case 'playbook': return <PlaybookTab />;
      case 'prework': return <PreWorkTab />;
      default: return <OverviewTab />;
    }
  };

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      <Header />
      <TabBar activeTab={activeTab} setActiveTab={setActiveTab} />
      <div style={{ padding: '32px 20px 60px' }} key={activeTab}>
        {renderTab()}
      </div>
      <div style={{
        textAlign: 'center', padding: '20px', color: C.gray, fontSize: 12,
        borderTop: `1px solid ${C.skyBlue}`, background: C.white
      }}>
        Nestlé Ecuador · MANCOM 2026 · Confidencial — Uso interno únicamente
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
